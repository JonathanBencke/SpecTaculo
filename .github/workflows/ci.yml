name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Validar schema de todos os agentes YAML
        run: |
          python -c "import sys; sys.path.insert(0,'src'); from pathlib import Path; from schema import AgentSpec; [AgentSpec.from_yaml(p) for p in sorted(Path('src/agents').glob('*.yml'))]; print('schema OK para todos os agentes')"

      - name: Gerar artefatos (todas as CLIs, com --clean)
        run: python src/generate.py all --clean

      - name: Verificar que o git não detecta diferenças no gerado
        shell: bash
        run: |
          # Como generated/ é gitignored, apenas confirmamos que o comando saiu limpo.
          test -d generated/.claude/skills/spectaculo-run
          test -d generated/.kimi-code/skills/spectaculo-run
          test -f generated/.opencode/agents/spectaculo-run.md
          test -f generated/.kiro/agents/spectaculo-run.json
          echo "Estrutura de saída OK."

      - name: Rodar testes
        run: pytest tests/ -v --cov=src --cov-report=term-missing

      - name: Validar JSONs do kiro
        shell: bash
        run: |
          for f in generated/.kiro/agents/*.json; do
            python -c "import json,sys; json.load(open(sys.argv[1], encoding='utf-8'))" "$f"
          done
          echo "Todos os JSONs do kiro são válidos."

      - name: Validar install.sh (shellcheck, se disponível)
        if: runner.os == 'Linux'
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck install.sh
          else
            echo "shellcheck não instalado, pulando."
          fi
